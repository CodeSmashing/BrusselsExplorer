<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>BrusselsExplorer</title>
	<link rel="stylesheet" href="./css/style.css">
	<link rel="icon" type="image/png" href="./img/favicon.png" />
</head>

<body>
	<header>
		<h1>Brussel Toilet Searcher</h1>
	</header>
	<aside class="hidden">
		<nav>
			<button class="return"><img src="./img/menuIcon.png" alt=">"></button>
		</nav>
		<section id="favourites-container">
			<h2>Favourites</h2>
		</section>
	</aside>
	<main>
		<button id="locate-button">Search restrooms's in my area</button>
		<div id="search-container">
			<div id="search-input-container">
				<input type="text" id="search-input" placeholder="Zoekwoord">
				<button id="search-button">Search</button>
			</div>
			<select name="sort-menu" id="sort-menu">
				<optgroup label="Alphabetical">
					<option value="alfa-asc">Alphabetical ascending</option>
					<option value="alfa-desc">Alphabetical descending</option>
				</optgroup>
				<optgroup label="Afstand">
					<option value="distance-asc">Distance ascending</option>
					<option value="distance-desc">Distance descending</option>
				</optgroup>
			</select>
			<section id="search-filter-container">
				<div name="price" class="filter-item">
					<input type="checkbox" name="price" id="filter-price">
					<label for="filter-price">Free</label>
				</div>
			</section>
			<section id="distance-bar-chart-container">
				<table>
					<caption>Distance-graph</caption>
					<tbody>
						<table class="distance-bar-chart">

						</table>
					</tbody>
				</table>
			</section>
			<section id="search-results">
				<table>
					<thead>
						<tr>
							<th>Location</th>
							<th>Price</th>
							<th>Opening hours</th>
							<th>Owner</th>
							<th>Distance</th>
							<th>Favourite</th>
						</tr>
					</thead>
					<tbody></tbody>
				</table>
			</section>
		</div>
	</main>
	<footer>

	</footer>
</body>

<script type="module" src="./js/init.js"></script>
